services:
  postgres:
    image: postgres:16-alpine
    container_name: polepredict-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polepredict
    volumes:
      - polepredict_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polepredict"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  polepredict_pg_data:
